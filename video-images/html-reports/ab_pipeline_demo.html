<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A/B Pipeline Visualizer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f1115; color: #e0e0e0; min-height: 100vh; padding: 2rem; }
h1 { color: #58a6ff; font-size: 1.8rem; margin-bottom: 0.3rem; }
.subtitle { color: #8b949e; font-size: 0.9rem; margin-bottom: 1.5rem; }

/* Summary stats */
.summary-bar { display: flex; gap: 1.2rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
.stat-pill { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 0.8rem 1.4rem; text-align: center; min-width: 140px; }
.stat-pill .val { font-size: 1.6rem; font-weight: 700; color: #58a6ff; }
.stat-pill .lbl { font-size: 0.75rem; color: #8b949e; margin-top: 0.2rem; text-transform: uppercase; letter-spacing: 0.5px; }

/* Controls */
.controls { display: flex; align-items: center; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }
button { padding: 10px 22px; background: #238636; color: #fff; border: none; border-radius: 6px; font-size: 0.95rem; cursor: pointer; font-weight: 600; transition: background 0.2s; }
button:hover { background: #2ea043; }
button:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }
.slider-group { display: flex; align-items: center; gap: 0.6rem; }
.slider-group label { font-size: 0.85rem; color: #8b949e; }
input[type="range"] { width: 260px; accent-color: #58a6ff; }
.phase-label { background: #21262d; padding: 4px 12px; border-radius: 4px; font-size: 0.85rem; color: #58a6ff; font-weight: 600; min-width: 120px; text-align: center; }

/* Side-by-side panels */
.comparison { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
.panel { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 1.2rem; }
.panel h2 { font-size: 1.1rem; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid #21262d; }
.panel-a h2 { color: #f85149; }
.panel-b h2 { color: #3fb950; }

/* Fixture cards */
.fixture-card { background: #0d1117; border: 1px solid #21262d; border-radius: 8px; padding: 1rem; margin-bottom: 0.8rem; transition: all 0.3s ease; }
.fixture-card.highlight { border-color: #58a6ff; box-shadow: 0 0 12px rgba(88,166,255,0.15); }
.fixture-card .name { font-weight: 600; font-size: 0.9rem; color: #f0f6fc; margin-bottom: 0.6rem; }
.fixture-card .score-row { display: flex; align-items: center; gap: 0.8rem; margin-bottom: 0.4rem; }
.score-bar-bg { flex: 1; background: #21262d; border-radius: 4px; height: 22px; position: relative; overflow: hidden; }
.score-bar { height: 100%; border-radius: 4px; transition: width 0.6s ease; display: flex; align-items: center; padding-left: 8px; font-size: 0.75rem; font-weight: 700; color: #fff; }
.score-bar.good { background: linear-gradient(90deg, #238636, #3fb950); }
.score-bar.bad { background: linear-gradient(90deg, #da3633, #f85149); }
.threshold-mark { position: absolute; left: 93.91%; top: 0; bottom: 0; border-left: 2px dashed #f0883e; opacity: 0.7; }
.meta-row { display: flex; gap: 1rem; font-size: 0.8rem; color: #8b949e; margin-top: 0.4rem; }
.meta-row span { display: flex; align-items: center; gap: 0.3rem; }
.delta-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: 700; }
.delta-badge.pos { background: rgba(63,185,80,0.15); color: #3fb950; }
.delta-badge.neg { background: rgba(248,81,73,0.15); color: #f85149; }
.delta-badge.zero { background: rgba(139,148,158,0.1); color: #8b949e; }

/* Animations */
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.fixture-card { animation: fadeIn 0.3s ease forwards; }
.hidden { display: none; }

@media (max-width: 900px) { .comparison { grid-template-columns: 1fr; } }
</style>
</head>

const PHASE_NAMES = [
    "Snapshot", "Scan", "Analysis", "Pre-sim",
    "Simulation", "Inspection", "Relay", "Final"
];

const THRESHOLD = 93.91;
let currentPhase = 7;
let loaded = false;

function loadData() {
    loaded = true;
    document.getElementById('btnRun').disabled = true;
    document.getElementById('btnRun').textContent = '✓ Loaded';
    document.getElementById('phaseSlider').disabled = false;
    document.getElementById('compArea').classList.remove('hidden');
    renderSummary();
    renderPhase(7);
}

function renderSummary() {
    const s = REPORT_DATA.summary;
    const bar = document.getElementById('summaryBar');
    bar.innerHTML = `
        <div class="stat-pill"><div class="val">${s.avg_score_a.toFixed(1)}%</div><div class="lbl">Avg Score A (Off)</div></div>
        <div class="stat-pill"><div class="val">${s.avg_score_b.toFixed(1)}%</div><div class="lbl">Avg Score B (On)</div></div>
        <div class="stat-pill"><div class="val" style="color:#3fb950">+${s.avg_delta.toFixed(1)}%</div><div class="lbl">Avg Delta</div></div>
        <div class="stat-pill"><div class="val">${s.fixtures_with_improvement}/${REPORT_DATA.fixture_count}</div><div class="lbl">Improved</div></div>
        <div class="stat-pill"><div class="val">${s.fixtures_with_unlock}/${REPORT_DATA.fixture_count}</div><div class="lbl">Sim Unlocked</div></div>
    `;
}

function updatePhase(val) {
    currentPhase = parseInt(val);
    document.getElementById('phaseLabel').textContent = `Phase ${currentPhase} — ${PHASE_NAMES[currentPhase]}`;
    renderPhase(currentPhase);
}

function getPhaseScore(run, phase) {
    // Phases 0-2 always 100 (pre-analysis), phases 3+ use actual score
    if (phase < 3) return 100;
    // Gradually reveal score: phase 3 = 60% of final, 4 = 75%, 5 = 85%, 6 = 95%, 7 = 100%
    const pct = [0, 0, 0, 0.6, 0.75, 0.85, 0.95, 1.0];
    const base = 100;
    const final = run.score;
    return base + (final - base) * pct[phase];
}

function renderPhase(phase) {
    const cardsA = document.getElementById('cardsA');
    const cardsB = document.getElementById('cardsB');
    cardsA.innerHTML = '';
    cardsB.innerHTML = '';

    REPORT_DATA.results.forEach((r, idx) => {
        const scoreA = getPhaseScore(r.run_a, phase);
        const scoreB = getPhaseScore(r.run_b, phase);
        const delta = scoreB - scoreA;

        cardsA.innerHTML += buildCard(r.fixture, scoreA, r.run_a, delta, 'a', idx, phase);
        cardsB.innerHTML += buildCard(r.fixture, scoreB, r.run_b, delta, 'b', idx, phase);
    });
}

function buildCard(name, score, run, delta, side, idx, phase) {
    const isGood = score > THRESHOLD;
    const barClass = isGood ? 'good' : 'bad';
    const barWidth = Math.min(100, Math.max(2, score));
    const highlight = (delta !== 0 && phase >= 3) ? 'highlight' : '';

    let deltaHtml = '';
    if (side === 'b' && phase >= 3) {
        const cls = delta > 0 ? 'pos' : delta < 0 ? 'neg' : 'zero';
        const sign = delta > 0 ? '+' : '';
        deltaHtml = `<span class="delta-badge ${cls}">${sign}${delta.toFixed(1)}%</span>`;
    }

    const readyVisible = phase >= 3 ? run.ready_count : '—';
    const isolatedVisible = phase >= 3 ? run.isolated_count : '—';
    const simReady = phase >= 4 ? (run.simulation_ready ? '✓' : '✗') : '—';

    return `
        <div class="fixture-card ${highlight}" style="animation-delay: ${idx * 0.08}s">
            <div class="name">${name} ${deltaHtml}</div>
            <div class="score-row">
                <div class="score-bar-bg">
                    <div class="score-bar ${barClass}" style="width:${barWidth}%">${score.toFixed(1)}%</div>
                    <div class="threshold-mark"></div>
                </div>
            </div>
            <div class="meta-row">
                <span>Ready: ${readyVisible}</span>
                <span>Isolated: ${isolatedVisible}</span>
                <span>Sim: ${simReady}</span>
                <span>${run.duration_ms}ms</span>
            </div>
        </div>
    `;
}
