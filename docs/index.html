// ─── Engine: scrolls terminal up, keeping only visible lines ─────────────────
const screen = document.getElementById('screen');
const LINE_H = 13.5 * 1.55; // approx px per line
let idx = 0;

function maxLines() {
  return Math.floor((window.innerHeight - 56) / LINE_H);
}

function run() {
  if (idx >= S.length) return;
  const [delay, html] = S[idx];
  idx++;

  setTimeout(() => {
    const span = document.createElement('span');
    span.className = 'ln';
    span.innerHTML = html === '' ? ' ' : html;
    screen.appendChild(span);

    // Keep only maxLines() children — delete oldest
    const max = maxLines();
    while (screen.children.length > max) {
      screen.removeChild(screen.firstChild);
    }

    run();
  }, delay);
}

// Start immediately on load
window.addEventListener('load', () => setTimeout(run, 300));
